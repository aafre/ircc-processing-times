<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <span class="topbar-dot"></span>
    <span class="topbar-title">IRCC Processing Times</span>
    <span class="topbar-meta" id="meta"></span>
  </div>

  <div class="filter-row" id="filters"></div>

  <div class="ticker" id="stats"></div>

  <div class="toolbar">
    <input class="search-input" id="search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
    <div class="sort-controls" id="sort-controls"></div>
  </div>

  <div class="col-header">
    <span class="col-header-name">Country</span>
    <span class="col-header-days">Days</span>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span id="footer-count"></span>
    <span>r/CanadaVisitorVisa</span>
  </div>

<script src="app.js"></script>
</body>
</html>
